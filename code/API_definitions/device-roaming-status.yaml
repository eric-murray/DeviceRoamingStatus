externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/DeviceRoamingStatus

servers:
  - url: "{apiRoot}/device-roaming-status/vwip"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`

tags:
  - name: Roaming Status Retrieval
    description: Operation to get device roaming status and country information (if roaming) synchronously

paths:
  /retrieve:
    post:
      tags:
        - Roaming Status Retrieval
      summary: "Get the current roaming status and the country information"
      description: Get the current roaming status and the country information
      operationId: getRoamingStatus
      parameters:
        - $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"
      security:
        - openId:
            - device-roaming-status:read
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoamingStatusRequest"
            examples:
              INPUT_PHONE_NUMBER:
                summary: Phone number
                description: Retrieve roaming status for a device identified by a phone number
                value:
                  device:
                    phoneNumber: "+123456789"
              INPUT_IP_ADDRESS_V4:
                summary: IPv4 address
                description: Retrieve roaming status for a device identified by an IPv4 address
                value:
                  device:
                    ipv4Address:
                      publicAddress: "123.234.1.2"
                      publicPort: 1234
              INPUT_IP_ADDRESS_V6:
                summary: IPv6 address
                description: Retrieve roaming status for a device identified by an IPv6 address
                value:
                  device:
                    ipv6Address: "2001:db8:85a3:8d3:1319:8a2e:370:7344"
              INPUT_NO_DEVICE:
                summary: Device not provided
                description: The device has to be deducted from token
                value:
                  {}
        required: true
      responses:
        "200":
          description: Contains information about current roaming status
          headers:
            x-correlator:
              $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoamingStatusResponse"
              examples:
                Not Roaming:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    roaming: false
                No Country Name:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    roaming: true
                    countryCode: 901
                    countryName: []
                Single Country Code:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    roaming: true
                    countryCode: 262
                    countryName: ["DE"]
                Single Country Code With Device Disambiguation:
                  value:
                    device:
                      phoneNumber: "+123456789"
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    roaming: true
                    countryCode: 262
                    countryName: ["DE"]
                Multiple Country Names:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    roaming: true
                    countryCode: 340
                    countryName: ["BL", "GF", "GP", "MF", "MQ"]
                Last Status Update Time Unknown:
                  description: The API provider has recorded that the device is currently roaming, but has no information as to when that status was last confirmed to be correct. The API consumer must take this uncertainty into account when deciding on the value of the information to them.
                  value:
                    lastStatusTime: null
                    roaming: true
                    countryCode: 262
                    countryName: ["DE"]
        "400":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic400"
        "401":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic401"
        "403":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic403"
        "404":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic404"
        "422":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic422"
        "429":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic429"
        "503":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic503"

components:
  securitySchemes:
    openId:
      $ref: "../common/CAMARA_common.yaml#/components/securitySchemes/openId"

  schemas:
    LastStatusTime:
      description: |
        The last time that the device roaming status was confirmed to be correct by the API provider. It might not be possible to provide the current status because, for example, the device may not be connected to any mobile network.
        It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      type: string
      format: date-time
      maxLength: 64
      nullable: true
      example: "2018-04-05T17:31:00Z"

    ActiveRoaming:
      description: Roaming status. True, if it is roaming
      type: boolean

    CountryCode:
      description: The Mobile country code (MCC) as an geographic region identifier for the country and the dependent areas.
      type: integer
      format: int32
      minimum: 100
      maximum: 999

    CountryName:
      description: The ISO 3166 ALPHA-2 country-codes of mapped to mobile country code(MCC). If there is mapping of one MCC to multiple countries, then we have list of countries. If there is no mapping of MCC to any country, then an empty array [] shall be returned..
      type: array
      maxItems: 5
      items:
        description: The ISO 3166 ALPHA-2 country-code
        type: string
        maxLength: 2
        pattern: ^[A-Z]{2}$

    RoamingStatusResponse:
      description: The response body providing details of the roaming status of the requested device
      type: object
      required:
        - lastStatusTime
        - roaming
      properties:
        device:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/DeviceResponse"
        lastStatusTime:
          $ref: "#/components/schemas/LastStatusTime"
        roaming:
          $ref: "#/components/schemas/ActiveRoaming"
        countryCode:
          $ref: "#/components/schemas/CountryCode"
        countryName:
          $ref: "#/components/schemas/CountryName"

    RoamingStatusRequest:
      description: The request body for retrieving the current roaming status for the requested device.
      type: object
      properties:
        device:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/Device"
